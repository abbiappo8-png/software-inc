name: Release Windows Installer

# Al hacer push de un tag v* (p.ej. v0.1.0), compila el .exe en Windows y lo publica
# en GitHub Releases. El cliente lo descarga desde la página de Releases.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # necesario para crear el Release y subir el .exe

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias (recompila módulos nativos para Electron)
        # Se elimina el lockfile antes de instalar: fue generado en macOS y npm tiene un
        # bug con las dependencias opcionales por plataforma (rollup/esbuild win32); con el
        # lock presente no instala el binario de Windows. Ref: npm/cli#4828
        shell: bash
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Verificar (typecheck + tests)
        run: |
          npm run typecheck
          npm test

      - name: Compilar y publicar instalador en Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win
