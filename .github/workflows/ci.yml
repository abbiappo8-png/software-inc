name: CI

# Verificación en cada push/PR a main: typecheck + tests del núcleo de negocio.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm install (no npm ci) por el bug de deps opcionales por plataforma (npm/cli#4828)
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
